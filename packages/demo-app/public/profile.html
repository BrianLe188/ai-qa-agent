<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Demo App</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🛒 ShopDemo</div>
    <div class="nav-links">
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/products.html" class="nav-link">Products</a>
      <a href="/profile.html" class="nav-link active">Profile</a>
    </div>
    <div class="nav-user">
      <span id="user-name">User</span>
      <button class="btn btn-sm btn-outline" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>Edit Profile</h1>

    <div id="success-message" class="success-message" style="display:none"></div>

    <div class="card">
      <form id="profile-form" onsubmit="return handleSave(event)">
        <div class="form-row-2col">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" value="John" required>
            <span class="field-error" id="first-name-error"></span>
          </div>
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" value="Doe" required>
            <span class="field-error" id="last-name-error"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="user@example.com" readonly>
          <small class="hint">Email cannot be changed</small>
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+84 123 456 789">
        </div>

        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" name="country">
            <option value="">Select country</option>
            <option value="VN" selected>Vietnam</option>
            <option value="US">United States</option>
            <option value="JP">Japan</option>
            <option value="KR">South Korea</option>
            <option value="SG">Singapore</option>
          </select>
        </div>

        <div class="form-group">
          <label>Notifications</label>
          <label class="checkbox-label">
            <input type="checkbox" id="notify-email" checked> Email notifications
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="notify-sms"> SMS notifications
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" id="save-btn" class="btn btn-primary">Save Changes</button>
          <button type="button" class="btn btn-outline" onclick="handleCancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const user = JSON.parse(sessionStorage.getItem('user') || 'null');
    if (!user) { window.location.href = '/'; }
    else { document.getElementById('user-name').textContent = user.name; }

    function handleSave(e) {
      e.preventDefault();
      clearErrors();

      const firstName = document.getElementById('first-name').value.trim();
      const lastName = document.getElementById('last-name').value.trim();

      if (!firstName) { showFieldError('first-name-error', 'First name is required'); return false; }
      if (!lastName) { showFieldError('last-name-error', 'Last name is required'); return false; }

      // Simulate save
      const success = document.getElementById('success-message');
      success.textContent = 'Profile updated successfully!';
      success.style.display = 'block';
      setTimeout(() => { success.style.display = 'none'; }, 3000);
      return false;
    }

    function handleCancel() {
      window.location.href = '/dashboard.html';
    }

    function handleLogout() {
      sessionStorage.removeItem('user');
      window.location.href = '/';
    }

    function showFieldError(id, msg) {
      document.getElementById(id).textContent = msg;
    }

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
    }
  </script>
</body>
</html>
